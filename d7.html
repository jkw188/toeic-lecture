        const tbody = document.getElementById('vocabBody');
        const searchInput = document.getElementById('searchInput');

        function renderTable(data) {
            tbody.innerHTML = '';
            if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">Không tìm thấy từ vựng nào.</td></tr>'; return; }
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                let posClass = 'phr';
                if (item.type.includes('syn')) posClass = 'syn';
                else if (item.type.includes('der')) posClass = 'der';
                else if (item.type.includes('ant')) posClass = 'ant';
                else if (!item.type.includes('phr')) posClass = 'main';
                tr.innerHTML = `<td class="col-stt">${index + 1}</td><td class="col-word">${item.word}</td><td class="col-ipa">${item.ipa}</td><td class="col-type"><span class="pos-tag ${posClass}">${item.type}</span></td><td class="col-mean">${item.meaning}</td><td class="col-ex">${item.example ? `"${item.example}"` : ''}</td>`;
                tbody.appendChild(tr);
            });
        }
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filteredData = vocabularyList.filter(item => item.word.toLowerCase().includes(keyword) || item.meaning.toLowerCase().includes(keyword));
            renderTable(filteredData);
        });
        renderTable(vocabularyList);
