<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 01: Recruitment - English Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --secondary-bg: #EEF2FF;
            --border: #E5E7EB;
            --text-dark: #111827;
            --text-gray: #4B5563;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB;
            color: var(--text-dark);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .nav-bar {
            margin-bottom: 2rem;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: color 0.2s;
        }

        .btn-back:hover { color: var(--primary); }
        .btn-back span { margin-right: 5px; }

        header h1 {
            color: var(--primary);
            margin-top: 0.5rem;
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
        }
        .search-box:focus { border-color: var(--primary); }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background-color: #F3F4F6;
            text-align: left;
            padding: 1rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-gray);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        /* Column Widths */
        .col-stt { width: 50px; text-align: center; color: #9CA3AF; font-weight: 500; }
        .col-ipa { width: 140px; font-family: 'Fira Code', monospace; color: #6B7280; font-size: 0.85rem; }
        .col-word { width: 200px; font-weight: 600; color: var(--primary); font-size: 1.05rem; }
        .col-type { width: 120px; }
        .col-mean { width: 250px; }
        .col-ex { color: #4B5563; font-style: italic; }

        .pos-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            background-color: #FEF3C7;
            color: #92400E;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .pos-tag.main { background-color: #EEF2FF; color: #4F46E5; } /* Màu xanh cho từ chính */
        .pos-tag.syn { background-color: #ECFDF5; color: #047857; }  /* Màu xanh lá cho Syn */
        .pos-tag.der { background-color: #FFFBEB; color: #B45309; }  /* Màu vàng cho Der */
        .pos-tag.phr { background-color: #F3F4F6; color: #374151; }  /* Màu xám cho Phrase */

    </style>
</head>
<body>

    <div class="container">
        <div class="nav-bar">
            <a href="index.html" class="btn-back"><span>&larr;</span> Back to Dashboard</a>
        </div>

        <header>
            <h1>Day 01: Tuyển dụng (Recruitment)</h1>
            <p style="color: #666;">Danh sách từ vựng đầy đủ từ Hackers TOEIC</p>
        </header>

        <input type="text" id="searchInput" class="search-box" placeholder="Tìm kiếm từ vựng (Word, Meaning)...">

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="col-stt">STT</th>
                        <th class="col-word">Từ vựng</th>
                        <th class="col-ipa">Phiên âm</th>
                        <th class="col-type">Từ loại</th>
                        <th class="col-mean">Nghĩa</th>
                        <th class="col-ex">Ví dụ</th>
                    </tr>
                </thead>
                <tbody id="vocabBody">
                    <!-- Javascript will render rows here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Dữ liệu đã được làm phẳng (Flattened) và bổ sung đầy đủ cụm từ
        const vocabularyList = [
    { word: "Résumé", ipa: "/ˈrez.ə.meɪ/", type: "n", meaning: "Sơ yếu lý lịch", example: "Fax your résumé and cover letter. *(Vui lòng fax sơ yếu lý lịch và thư xin việc của bạn.)*" },
    { word: "Opening", ipa: "/ˈoʊ.pən.ɪŋ/", type: "n", meaning: "Vị trí trống, lễ khai trương", example: "Job openings at the restaurant. *(Các vị trí việc làm trống tại nhà hàng.)*" },
    { word: "Vacancy", ipa: "/ˈveɪ.kən.si/", type: "n (syn)", meaning: "Khoảng trống, vị trí trống", example: "We have a vacancy. *(Chúng tôi có một vị trí trống.)*" },
    { word: "Applicant", ipa: "/ˈæp.lə.kənt/", type: "n", meaning: "Ứng viên", example: "Applicants are required to submit a résumé. *(Các ứng viên được yêu cầu nộp sơ yếu lý lịch.)*" },
    { word: "Apply", ipa: "/əˈplaɪ/", type: "v (der)", meaning: "Ứng tuyển, áp dụng", example: "She decided to apply for the job. *(Cô ấy quyết định ứng tuyển cho công việc.)*" },
    { word: "Application", ipa: "/ˌæp.ləˈkeɪ.ʃən/", type: "n (der)", meaning: "Đơn ứng tuyển", example: "Please fill out this application form. *(Vui lòng điền vào đơn ứng tuyển này.)*" },
    { word: "Appliance", ipa: "/əˈplaɪ.əns/", type: "n", meaning: "Thiết bị, dụng cụ (dễ nhầm)", example: "Kitchen appliances. *(Các thiết bị nhà bếp.)*" },
    { word: "Requirement", ipa: "/rɪˈkwaɪr.mənt/", type: "n", meaning: "Yêu cầu, điều kiện", example: "A requirement of this job. *(Một yêu cầu của công việc này.)*" },
    { word: "Require", ipa: "/rɪˈkwaɪr/", type: "v (der)", meaning: "Yêu cầu", example: "The position requires at least three years of experience. *(Vị trí này yêu cầu ít nhất ba năm kinh nghiệm.)*" },
    { word: "Prerequisite", ipa: "/ˌpriːˈrek.wə.zɪt/", type: "n (syn)", meaning: "Điều kiện tiên quyết", example: "A bachelor's degree is a prerequisite for this course. *(Bằng cử nhân là điều kiện tiên quyết cho khóa học này.)*" },
    { word: "Meet", ipa: "/miːt/", type: "v", meaning: "Đáp ứng (nhu cầu/yêu cầu)", example: "Meet all the requirements. *(Đáp ứng tất cả các yêu cầu.)*" },
    { word: "Satisfy", ipa: "/ˈsæt̬.ɪs.faɪ/", type: "v (syn)", meaning: "Thỏa mãn", example: "The company tries to satisfy its customers' needs. *(Công ty cố gắng thỏa mãn nhu cầu của khách hàng.)*" },
    { word: "Fulfill", ipa: "/fʊlˈfɪl/", type: "v (syn)", meaning: "Hoàn thành", example: "He will fulfill his responsibilities. *(Anh ấy sẽ hoàn thành các trách nhiệm của mình.)*" },
    { word: "Qualified", ipa: "/ˈkwɑː.lə.faɪd/", type: "adj", meaning: "Đủ khả năng, đủ điều kiện", example: "Qualified for the position. *(Đủ điều kiện cho vị trí này.)*" },
    { word: "Qualify", ipa: "/ˈkwɑː.lə.faɪ/", type: "v (der)", meaning: "Đủ điều kiện", example: "This training will qualify you for the new role. *(Khóa đào tạo này sẽ giúp bạn đủ điều kiện cho vai trò mới.)*" },
    { word: "Qualification", ipa: "/ˌkwɑː.lə.fəˈkeɪ.ʃən/", type: "n (der)", meaning: "Bằng cấp, năng lực", example: "What are the qualifications for this job? *(Các bằng cấp/năng lực cho công việc này là gì?)*" },
    { word: "Certified", ipa: "/ˈsɝː.t̬ə.faɪd/", type: "adj (syn)", meaning: "Được chứng nhận", example: "He is a certified public accountant. *(Anh ấy là một kế toán viên công chứng được chứng nhận.)*" },
    { word: "Candidate", ipa: "/ˈkæn.dɪ.deɪt/", type: "n", meaning: "Thí sinh, ứng viên", example: "Five candidates selected. *(Năm ứng viên đã được chọn.)*" },
    { word: "Confidence", ipa: "/ˈkɑːn.fə.dəns/", type: "n", meaning: "Sự tự tin, lòng tin", example: "Confidence in her ability. *(Sự tự tin vào khả năng của cô ấy.)*" },
    { word: "Confident", ipa: "/ˈkɑːn.fə.dənt/", type: "adj (der)", meaning: "Tự tự", example: "I am confident in my skills. *(Tôi tự tin vào các kỹ năng của mình.)*" },
    { word: "Highly", ipa: "/ˈhaɪ.li/", type: "adv", meaning: "Rất, hết sức", example: "Highly qualified. *(Có trình độ rất cao.)*" },
    { word: "Professional", ipa: "/prəˈfeʃ.ən.əl/", type: "adj/n", meaning: "Chuyên nghiệp / Chuyên gia", example: "A professional photographer. *(Một nhiếp ảnh gia chuyên nghiệp.)*" },
    { word: "Profession", ipa: "/prəˈfeʃ.ən/", type: "n (der)", meaning: "Nghề nghiệp", example: "Teaching is a noble profession. *(Giáo dục là một nghề nghiệp cao quý.)*" },
    { word: "Interview", ipa: "/ˈɪn.t̬ɚ.vjuː/", type: "n/v", meaning: "Phỏng vấn", example: "Interviews held in room 3. *(Các buổi phỏng vấn được tổ chức tại phòng số 3.)*" },
    { word: "Hire", ipa: "/haɪr/", type: "v", meaning: "Thuê, tuyển dụng", example: "Hire new employees. *(Thuê nhân viên mới.)*" },
    { word: "Training", ipa: "/ˈtreɪ.nɪŋ/", type: "n", meaning: "Sự đào tạo", example: "On-the-job training. *(Đào tạo tại chỗ/trong quá trình làm việc.)*" },
    { word: "Reference", ipa: "/ˈref.ɚ.əns/", type: "n", meaning: "Sự giới thiệu, tham khảo", example: "Reference letter. *(Thư giới thiệu.)*" },
    { word: "Refer", ipa: "/rɪˈfɝː/", type: "v (der)", meaning: "Tham khảo, xem", example: "Please refer to the attached document. *(Vui lòng tham khảo tài liệu đính kèm.)*" },
    { word: "Position", ipa: "/pəˈzɪʃ.ən/", type: "n", meaning: "Vị trí, chức vụ", example: "The advertised position. *(Vị trí được quảng cáo.)*" },
    { word: "Achievement", ipa: "/əˈtʃiːv.mənt/", type: "n", meaning: "Thành tựu", example: "List your achievements. *(Liệt kê các thành tựu của bạn.)*" },
    { word: "Achiever", ipa: "/əˈtʃiː.vɚ/", type: "n (der)", meaning: "Người đạt thành tích", example: "She is a high achiever in her class. *(Cô ấy là một người đạt thành tích cao trong lớp.)*" },
    { word: "Impressed", ipa: "/ɪmˈprest/", type: "adj", meaning: "Bị ấn tượng", example: "The CEO was impressed. *(Vị Giám đốc điều hành đã bị ấn tượng.)*" },
    { word: "Impressive", ipa: "/ɪmˈpres.ɪv/", type: "adj (der)", meaning: "Gây ấn tượng", example: "His resume is very impressive. *(Sơ yếu lý lịch của anh ấy rất ấn tượng.)*" },
    { word: "Excellent", ipa: "/ˈek.səl.ənt/", type: "adj", meaning: "Xuất sắc", example: "Excellent skills. *(Kỹ năng xuất sắc.)*" },
    { word: "Eligible", ipa: "/ˈel.ə.dʒə.bəl/", type: "adj", meaning: "Đủ tư cách, thích hợp", example: "Eligible for paid holidays. *(Đủ điều kiện cho các ngày nghỉ có lương.)*" },
    { word: "Ineligible", ipa: "/ɪnˈel.ə.dʒə.bəl/", type: "adj (ant)", meaning: "Không đủ tư cách", example: "He is ineligible to vote. *(Anh ấy không đủ tư cách để bầu cử.)*" },
    { word: "Identify", ipa: "/aɪˈden.t̬ə.faɪ/", type: "v", meaning: "Nhận diện", example: "Easy to identify. *(Dễ dàng nhận diện.)*" },
    { word: "Identification", ipa: "/aɪˌden.t̬ə.fəˈkeɪ.ʃən/", type: "n (der)", meaning: "Giấy tờ tùy thân", example: "Please show your identification. *(Vui lòng xuất trình giấy tờ tùy thân của bạn.)*" },
    { word: "Associate", ipa: "/əˈsoʊ.ʃi.eɪt/", type: "v", meaning: "Liên kết", example: "Associated with a competitor. *(Liên kết với một đối thủ cạnh tranh.)*" },
    { word: "Association", ipa: "/əˌsoʊ.siˈeɪ.ʃən/", type: "n (der)", meaning: "Hiệp hội, sự liên kết", example: "The medical association held a meeting. *(Hiệp hội y khoa đã tổ chức một cuộc họp.)*" },
    { word: "Condition", ipa: "/kənˈdɪʃ.ən/", type: "n", meaning: "Điều kiện", example: "Conditions of employment. *(Các điều kiện việc làm.)*" },
    { word: "Employment", ipa: "/ɪmˈplɔɪ.mənt/", type: "n", meaning: "Việc làm", example: "Employment opportunities. *(Cơ hội việc làm.)*" },
    { word: "Employ", ipa: "/ɪmˈplɔɪ/", type: "v (der)", meaning: "Thuê", example: "The factory employs over 500 workers. *(Nhà máy thuê hơn 500 công nhân.)*" },
    { word: "Employee", ipa: "/ɪmˈplɔɪ.iː/", type: "n (der)", meaning: "Nhân viên", example: "Every employee will get a bonus. *(Mỗi nhân viên sẽ nhận được một khoản tiền thưởng.)*" },
    { word: "Employer", ipa: "/ɪmˈplɔɪ.ɚ/", type: "n (der)", meaning: "Nhà tuyển dụng", example: "Her employer is very generous. *(Nhà tuyển dụng của cô ấy rất hào phóng.)*" },
    { word: "Unemployment", ipa: "/ˌʌn.ɪmˈplɔɪ.mənt/", type: "n (ant)", meaning: "Thất nghiệp", example: "The unemployment rate has decreased. *(Tỷ lệ thất nghiệp đã giảm.)*" },
    { word: "Lack", ipa: "/læk/", type: "v/n", meaning: "Thiếu / Sự thiếu hụt", example: "Lack of funds. *(Sự thiếu hụt nguồn quỹ.)*" },
    { word: "Managerial", ipa: "/ˌmæn.əˈdʒɪr.i.əl/", type: "adj", meaning: "Thuộc quản lý", example: "Managerial position. *(Vị trí quản lý.)*" },
    { word: "Manage", ipa: "/ˈmæn.ədʒ/", type: "v (der)", meaning: "Quản lý", example: "He knows how to manage a team. *(Anh ấy biết cách quản lý một đội.)*" },
    { word: "Supervisory", ipa: "/ˌsuː.pɚˈvaɪ.zɚ.i/", type: "adj (syn)", meaning: "Giám sát", example: "She has a supervisory role. *(Cô ấy có vai trò giám sát.)*" },
    { word: "Diligent", ipa: "/ˈdɪl.ə.dʒənt/", type: "adj", meaning: "Siêng năng", example: "Diligent workers. *(Những công nhân siêng năng.)*" },
    { word: "Diligence", ipa: "/ˈdɪl.ə.dʒəns/", type: "n (der)", meaning: "Sự cần cù", example: "He was rewarded for his diligence. *(Anh ấy được khen thưởng vì sự cần cù của mình.)*" },
    { word: "Familiar", ipa: "/fəˈmɪl.jɚ/", type: "adj", meaning: "Quen thuộc", example: "Become familiar with it. *(Trở nên quen thuộc với nó.)*" },
    { word: "Unfamiliar", ipa: "/ˌʌn.fəˈmɪl.jɚ/", type: "adj (ant)", meaning: "Xa lạ", example: "The terminology is completely unfamiliar to me. *(Các thuật ngữ này hoàn toàn xa lạ với tôi.)*" },
    { word: "Proficiency", ipa: "/prəˈfɪʃ.ən.si/", type: "n", meaning: "Sự thông thạo", example: "Proficiency in a language. *(Sự thông thạo một ngôn ngữ.)*" },
    { word: "Proficient", ipa: "/prəˈfɪʃ.ənt/", type: "adj (der)", meaning: "Thành thạo", example: "She is proficient in English. *(Cô ấy thành thạo tiếng Anh.)*" },
    { word: "Prospective", ipa: "/prəˈspek.tɪv/", type: "adj", meaning: "Có triển vọng", example: "Prospective employees. *(Những nhân viên có triển vọng.)*" },
    { word: "Prospect", ipa: "/ˈprɑː.spekt/", type: "n (der)", meaning: "Triển vọng", example: "There is little prospect of success. *(Có rất ít triển vọng thành công.)*" },
    { word: "Appeal", ipa: "/əˈpiːl/", type: "v", meaning: "Thu hút, hấp dẫn", example: "Appealed to the staff. *(Đã thu hút nhân viên.)*" },
    { word: "Attract", ipa: "/əˈtrækt/", type: "v (syn)", meaning: "Thu hút", example: "The new benefits attract many applicants. *(Các phúc lợi mới thu hút nhiều ứng viên.)*" },
    { word: "Specialize", ipa: "/ˈspeʃ.ə.laɪz/", type: "v", meaning: "Chuyên về", example: "Specialize in design. *(Chuyên về thiết kế.)*" },
    { word: "Apprehensive", ipa: "/ˌæp.rəˈhen.sɪv/", type: "adj", meaning: "Lo lắng, e sợ", example: "Feel apprehensive. *(Cảm thấy lo lắng.)*" },
    { word: "Concerned", ipa: "/kənˈsɝːnd/", type: "adj (syn)", meaning: "Lo ngại", example: "We are concerned about the delay. *(Chúng tôi lo ngại về sự chậm trễ.)*" },
    { word: "Consultant", ipa: "/kənˈsʌl.tənt/", type: "n", meaning: "Cố vấn", example: "Design consultant. *(Cố vấn thiết kế.)*" },
    { word: "Consult", ipa: "/kənˈsʌlt/", type: "v (der)", meaning: "Hỏi ý kiến", example: "You should consult a lawyer. *(Bạn nên hỏi ý kiến một luật sư.)*" },
    { word: "Entitle", ipa: "/ɪnˈtaɪ.t̬əl/", type: "v", meaning: "Cho quyền", example: "Entitled to benefits. *(Được quyền hưởng các phúc lợi.)*" },
    { word: "Degree", ipa: "/dɪˈɡriː/", type: "n", meaning: "Bằng cấp, độ", example: "Bachelor's degree. *(Bằng cử nhân.)*" },
    { word: "Payroll", ipa: "/ˈpeɪ.roʊl/", type: "n", meaning: "Bảng lương", example: "Added to the payroll. *(Được thêm vào bảng lương.)*" },
    { word: "Recruit", ipa: "/rɪˈkruːt/", type: "v/n", meaning: "Tuyển dụng", example: "Recruits graduates. *(Tuyển dụng sinh viên mới tốt nghiệp.)*" },
    { word: "Recruitment", ipa: "/rɪˈkruːt.mənt/", type: "n (der)", meaning: "Sự tuyển dụng", example: "The recruitment process takes two weeks. *(Quá trình tuyển dụng mất hai tuần.)*" },
    { word: "Certification", ipa: "/ˌsɝː.t̬ə.fəˈkeɪ.ʃən/", type: "n", meaning: "Giấy chứng nhận", example: "Accounting certification. *(Giấy chứng nhận kế toán.)*" },
    { word: "Certify", ipa: "/ˈsɝː.t̬ə.faɪ/", type: "v (der)", meaning: "Chứng nhận", example: "This document will certify your identity. *(Tài liệu này sẽ chứng nhận danh tính của bạn.)*" },
    { word: "Certificate", ipa: "/sɚˈtɪf.ə.kət/", type: "n (der)", meaning: "Chứng chỉ", example: "She received a certificate of completion. *(Cô ấy đã nhận được chứng chỉ hoàn thành.)*" },
    { word: "Occupation", ipa: "/ˌɑː.kjəˈpeɪ.ʃən/", type: "n", meaning: "Nghề nghiệp", example: "Challenging occupation. *(Nghề nghiệp đầy thử thách.)*" },
    { word: "Occupy", ipa: "/ˈɑː.kjə.paɪ/", type: "v (der)", meaning: "Chiếm giữ", example: "The company occupies the whole building. *(Công ty chiếm giữ toàn bộ tòa nhà.)*" },

        const tbody = document.getElementById('vocabBody');
        const searchInput = document.getElementById('searchInput');

        function renderTable(data) {
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">Không tìm thấy từ vựng nào.</td></tr>';
                return;
            }

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                
                // Logic hiển thị tag loại từ
                let posClass = 'phr'; // Mặc định màu xám
                if (item.type.includes('syn')) posClass = 'syn';
                else if (item.type.includes('der')) posClass = 'der';
                else if (!item.type.includes('phr')) posClass = 'main'; // Từ chính màu xanh

                tr.innerHTML = `
                    <td class="col-stt">${index + 1}</td>
                    <td class="col-word">${item.word}</td>
                    <td class="col-ipa">${item.ipa}</td>
                    <td class="col-type">
                        <span class="pos-tag ${posClass}">
                            ${item.type}
                        </span>
                    </td>
                    <td class="col-mean">${item.meaning}</td>
                    <td class="col-ex">${item.example ? `"${item.example}"` : ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filteredData = vocabularyList.filter(item => 
                item.word.toLowerCase().includes(keyword) || 
                item.meaning.toLowerCase().includes(keyword)
            );
            renderTable(filteredData);
        });

        // Init
        renderTable(vocabularyList);
    </script>
